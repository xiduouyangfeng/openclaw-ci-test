name: CI Pipeline Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        if [ -f package.json ]; then
          npm install
        fi
    
    - name: Run tests (故意失败)
      run: |
        echo "🧪 Running tests..."
        echo "❌ TEST FAILED: Intentional failure for testing"
        exit 1
    
    - name: Build
      run: |
        echo "🔨 Building..."
        echo "✅ Build successful"
