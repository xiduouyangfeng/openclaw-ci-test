name: CI Pipeline Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Check JavaScript files
      run: |
        echo "🧪 Checking JavaScript syntax..."
        for file in *.js; do
          if [ -f "$file" ]; then
            node --check "$file" && echo "✅ $file: OK" || echo "❌ $file: FAILED"
          fi
        done
    
    - name: Build
      run: |
        echo "🔨 Building..."
        echo "✅ Build successful"
